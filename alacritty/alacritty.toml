[env]
TERM = "xterm-256color"

[cursor.style]
blinking = "on"
shape = "Beam"
[window]
padding.x = 20
padding.y = 20
decorations = "full"
dynamic_title = true

opacity = 0.85
blur = false

option_as_alt = "Both"

[font]
size=20

[font.normal]
# family = "JetBrains Mono"
family = "JetBrainsMono Nerd Font"

[window.dimensions]
columns = 60
lines = 20

[colors.primary]
background = "0x000000"  # black base tint
